name: Pre-flight Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-flight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run pre-flight checks
        run: uv run python scripts/ci/pre_flight.py
