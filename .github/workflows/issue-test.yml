name: Issue-Triggered Test

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      repo_url:
        description: "GitHub repository URL"
        required: true
        type: string
      branch:
        description: "Branch name"
        required: false
        default: "main"
        type: string
      test_command:
        description: "Custom test command (optional)"
        required: false
        type: string

permissions:
  issues: write
  contents: read
  models: read

concurrency:
  group: issue-test-${{ github.event.issue.number || 'dispatch' }}
  cancel-in-progress: true

jobs:
  test-on-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout agent-skill-infra
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run issue tester
        run: uv run python scripts/ci/issue_tester.py
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
          ISSUE_BODY: ${{ github.event.issue.body || '' }}
          TRIGGER_SOURCE: ${{ github.event_name }}
          REPO_URL: ${{ inputs.repo_url || '' }}
          BRANCH: ${{ inputs.branch || 'main' }}
          TEST_COMMAND: ${{ inputs.test_command || '' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        timeout-minutes: 10
